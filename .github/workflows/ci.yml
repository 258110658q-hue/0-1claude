name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Job 1: 自动化测试（多平台 × 多 Python 版本矩阵）
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Test — py${{ matrix.python-version }} @ ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=. --cov-report=term-missing --cov-report=xml --ignore=learn-claude-code

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # Job 2: 代码质量检查（只拦真正的 bug，不拦风格偏好）
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: Lint — ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ruff
        uses: astral-sh/ruff-action@v1

  # ═══════════════════════════════════════════════════════════════
  # Job 3: 容器化验证（构建镜像，确认 Dockerfile 可被正确打包）
  # ═══════════════════════════════════════════════════════════════
  docker:
    name: Docker — build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agent-0-1claude:ci .

  # ═══════════════════════════════════════════════════════════════
  # Job 4: 发布（打 tag 时自动创建 GitHub Release）
  # ═══════════════════════════════════════════════════════════════
  publish:
    name: Publish — GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
